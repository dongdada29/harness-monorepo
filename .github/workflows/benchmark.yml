name: Harness Benchmark

on:
  schedule:
    - cron: '0 0 * * 1'  # 每周一
  workflow_dispatch:          # 手动触发

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/eval-cli/requirements.txt 2>/dev/null || true

      - name: Create output dir
        run: mkdir -p benchmark-results

      - name: Run Benchmark — agent-harness
        run: |
          python3 tools/eval-cli/benchmark.py \
            --project packages/agent-harness \
            --output json \
            --save benchmark-results/agent-harness.json

      - name: Run Benchmark — nuwax-harness
        run: |
          python3 tools/eval-cli/benchmark.py \
            --project packages/nuwax-harness \
            --output json \
            --save benchmark-results/nuwax-harness.json

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_number }}
          path: benchmark-results/

      - name: Comment Results
        if: github.event.issue != null
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Harness Benchmark Results\n\n';
            ['agent-harness', 'nuwax-harness'].forEach(name => {
              const file = `benchmark-results/${name}.json`;
              if (!fs.existsSync(file)) return;
              const results = JSON.parse(fs.readFileSync(file));
              body += `### ${name}\n`;
              body += `**Score**: ${results.overall || 0}/100 (${results.grade || 'N/A'})\n\n`;
              body += `| Category | Score |\n|---------|------|\n`;
              body += `| Efficiency | ${results.efficiency?.completion_rate || 0}% |\n`;
              body += `| Quality | ${results.quality?.quality_base || 0}% |\n`;
              body += `| Behavior | ${results.behavior?.update_rate || 0}% |\n`;
              body += `| Autonomy | ${results.autonomy?.autonomy_rate || 0}% |\n\n`;
            });
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
