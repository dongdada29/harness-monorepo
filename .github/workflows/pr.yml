name: PR Lifecycle

on:
  repository_dispatch:
    types: [cp3-complete, pr-auto-create]
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Source branch'
        required: false
        default: ''
      autonomy_level:
        description: 'Autonomy level (4-5)'
        required: false
        default: '4'

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ── Job 1: Create PR ──────────────────────────────────────────
  pr-create:
    name: Create PR
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    outputs:
      pr_number: ${{ steps.create_pr.outputs.pr_number }}
      pr_url: ${{ steps.create_pr.outputs.pr_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine branches
        id: branches
        run: |
          SOURCE="${GITHUB_REF#refs/heads/}"
          TARGET="main"
          if [ -n "${{ github.event.inputs.branch }}" ]; then
            SOURCE="${{ github.event.inputs.branch }}"
          fi
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Validate CP3
        id: cp3check
        run: |
          chmod +x scripts/get-cp3-status.py
          STATUS=$(python3 scripts/get-cp3-status.py)
          echo "cp3=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "completed" ]; then
            echo "CP3 is '$STATUS' — skipping PR creation"
            exit 78
          fi
          echo "CP3 validated: completed"

      - name: Create Pull Request
        id: create_pr
        uses: actions/github-script@v7
        with:
          script: |
            const source = '${{ steps.branches.outputs.source }}';
            const target = '${{ steps.branches.outputs.target }}';
            const AL = '${{ github.event.inputs.autonomy_level }}' || '4';

            const { data: commits } = await github.rest.repos.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              per_page: 1,
            });
            const title = commits[0]?.commit?.message?.split('\n')[0] || 'Update from agent';

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              head: source,
              base: target,
              body: [
                '## Agent Pull Request',
                '',
                '**Autonomy Level:** L' + AL,
                '**CP3 Status:** ✅ Completed',
                '',
                '---',
                '_Auto-generated by harness-monorepo PR workflow_',
              ].join('\n'),
            });

            console.log('::set-output name=pr_number::' + pr.data.number);
            console.log('::set-output name=pr_url::' + pr.data.html_url);

      - name: Label PR
        if: steps.create_pr.outputs.pr_number
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.create_pr.outputs.pr_number }}'),
              labels: ['harness', 'auto-pr', 'cp3-complete'],
            });

  # ── Job 2: CI Gates ───────────────────────────────────────────
  ci-gates:
    name: CI Gates
    runs-on: ubuntu-latest
    needs: pr-create
    if: github.event_name == 'pull_request' || github.event_name == 'check_suite'
    strategy:
      fail-fast: false
      matrix:
        include:
          - gate_name: lint
            gate_cmd: "shellcheck $(find . -name '*.sh' -type f) 2>/dev/null || true"
          - gate_name: test
            gate_cmd: "cd packages/agent-harness && bash tests/test-benchmark.sh 2>/dev/null || cd ../.. && python3 -m pytest tests/ -q 2>/dev/null || bash tests/test-setup.sh 2>/dev/null || true"
          - gate_name: benchmark
            gate_cmd: "python3 tools/benchmark/runner.py --project packages/agent-harness --output json 2>/dev/null || python3 tools/benchmark/runner.py --project . --output json 2>/dev/null || true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "Gate: ${{ matrix.gate_name }}"
        run: ${{ matrix.gate_cmd }}

      - name: Record gate status
        if: always()
        run: |
          echo "Gate [${{ matrix.gate_name }}] result: ${{ job.status }}"

  # ── Job 3: Auto Merge (L5+) ────────────────────────────────────
  auto-merge:
    name: Auto Merge (L5+)
    runs-on: ubuntu-latest
    needs: ci-gates
    if: github.event_name == 'pull_request' || github.event_name == 'check_suite'
    steps:
      - uses: actions/checkout@v4

      - name: Get autonomy level
        id: autonomy
        run: |
          chmod +x scripts/get-autonomy-level.py
          AL=$(python3 scripts/get-autonomy-level.py)
          echo "level=$AL" >> $GITHUB_OUTPUT
          echo "Autonomy Level: L$AL"

      - name: L5+ auto-merge
        if: needs.ci-gates.result == 'success' && steps.autonomy.outputs.level >= 5
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) { console.log('No PR in payload'); return; }

            const checks = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
              status: 'completed',
            });

            const allOk = checks.data.check_runs?.every(c => c.conclusion === 'success');
            if (!allOk) { console.log('Checks not all passed'); return; }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash',
              });
              console.log('PR #' + pr.number + ' auto-merged');
            } catch (e) {
              console.log('Merge error (may already be merged):', e.message);
            }

      - name: Post CI comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const ci = '${{ needs.ci-gates.result }}';
            const al = '${{ steps.autonomy.outputs.level }}';
            const passed = ci === 'success';

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                '## CI Gates: ' + (passed ? '✅ All Passed' : '❌ Failed'),
                '',
                '| Gate | Status |',
                '|------|--------|',
                '| lint | ' + (passed ? '✅' : '❌') + ' |',
                '| test | ' + (passed ? '✅' : '❌') + ' |',
                '| build | ' + (passed ? '✅' : '❌') + ' |',
                '',
                '**Autonomy Level:** L' + al,
                '',
                passed && parseInt(al) >= 5
                  ? '✅ **Auto-merge triggered for L5+**'
                  : 'ℹ️ Auto-merge disabled (L' + al + ')',
              ].join('\n'),
            });
