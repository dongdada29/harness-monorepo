name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: node --test tests/unit/index.test.js

  validate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run quick validation
        run: |
          chmod +x scripts/quick-validate.sh
          ./scripts/quick-validate.sh
        continue-on-error: true

      - name: Validate agent-harness
        run: |
          chmod +x packages/agent-harness/tests/validate-harness.sh
          cd packages/agent-harness && ./tests/validate-harness.sh
        continue-on-error: true

      - name: Test harness init with templates
        run: |
          chmod +x packages/cli/bin/harness.js
          mkdir -p /tmp/harness-ci-test-basic /tmp/harness-ci-test-adv
          node packages/cli/bin/harness.js init generic /tmp/harness-ci-test-basic --template basic
          node packages/cli/bin/harness.js init generic /tmp/harness-ci-test-adv --template advanced
          test -f /tmp/harness-ci-test-basic/harness/feedback/state/state.json
          test -f /tmp/harness-ci-test-adv/harness/feedback/state/state.json
          test -f /tmp/harness-ci-test-adv/harness/prompts/feature.md
          echo "✓ Template init tests passed"

  test-benchmark:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/eval-cli/requirements.txt 2>/dev/null || true

      - name: Test benchmark script
        run: |
          chmod +x packages/agent-harness/tests/test-benchmark.sh
          cd packages/agent-harness && ./tests/test-benchmark.sh
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check shell scripts
        run: |
          echo "=== Checking shell scripts ==="
          for f in $(find . -name "*.sh" -type f); do
            if shellcheck "$f" 2>/dev/null; then
              echo "  ✓ $f"
            else
              echo "  ⚠ $f (shellcheck not available, skipping)"
              break
            fi
          done

      - name: Check JSON files
        run: |
          echo "=== Checking JSON files ==="
          for f in $(find . -name "package.json" -type f); do
            python3 -c "import json; json.load(open('$f'))" 2>/dev/null && echo "  ✓ $f" || echo "  ✗ $f FAILED"
          done

      - name: Check core files exist
        run: |
          echo "=== Checking core files ==="
          for f in packages/cli/package.json packages/nuwax-harness/package.json core/constraints.md; do
            test -f "$f" && echo "  ✓ $f" || echo "  ✗ $f MISSING"
          done

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check documentation
        run: |
          echo "=== Checking documentation ==="
          test -f README.md && echo "✓ README.md" || echo "✗ README.md"
          test -f QUICKSTART.md && echo "✓ QUICKSTART.md" || echo "✗ QUICKSTART.md"
          test -f docs/BENCHMARK_METRICS.md && echo "✓ BENCHMARK_METRICS.md" || echo "✗ BENCHMARK_METRICS.md"
          test -f docs/VALIDATION.md && echo "✓ VALIDATION.md" || echo "✗ VALIDATION.md"
          test -f packages/agent-harness/CLAUDE.md && echo "✓ CLAUDE.md" || echo "✗ CLAUDE.md"
